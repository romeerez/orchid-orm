pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,mjs,ts,json}"
      run: pnpm exec oxlint --fix --deny-warnings {staged_files}
      stage_fixed: true
    fmt:
      glob: "*.{js,mjs,ts,json,md}"
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
